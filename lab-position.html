<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>CSS Position Lab - Muhammed Emin Dinç</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            margin: 0;
            padding: 0;
            min-height: 200vh;
        }

        .sabit-buton-sol {
            position: fixed;
            top: 16px;
            left: 16px;
            background-color: #e94560;
            color: white;
            padding: 9px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            z-index: 1000;
            transition: background-color 0.3s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .sabit-buton-sol:hover {
            background-color: #c73550;
            transform: translateY(-2px);
        }

        .sabit-buton-sol:active {
            transform: translateY(1px);
        }

        .sabit-buton-sag {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #0f3460;
            color: #e8e8e8;
            padding: 10px 22px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            z-index: 1000;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .sabit-buton-sag:hover {
            background-color: #16213e;
            color: #e94560;
        }

        .baslik-alani {
            text-align: center;
            padding: 70px 20px 10px 20px;
        }

        .baslik-alani h2 {
            color: #aaa;
            font-size: 16px;
            font-weight: normal;
            letter-spacing: 1px;
            margin: 0;
        }

        .kart-kapsayici {
            position: relative;
            width: 540px;
            margin: 25px auto 40px auto;
            background: linear-gradient(160deg, #16213e 0%, #0f3460 60%, #1a1a40 100%);
            border-radius: 14px;
            border: 1px solid #2a2a5a;
            padding: 55px 35px 55px 35px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
            min-height: 260px;
        }

        .tarih-etiketi {
            position: absolute;
            top: 16px;
            right: 16px;
            background-color: #533483;
            color: #e0d0f0;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            z-index: 3;
            cursor: pointer;
            transition: background-color 0.25s ease, transform 0.2s ease;
        }

        .tarih-etiketi:hover {
            background-color: #6a42a0;
            transform: scale(1.05);
        }

        .kategori-rozeti {
            position: absolute;
            top: 16px;
            left: 16px;
            background-color: #e94560;
            color: white;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            z-index: 3;
            cursor: pointer;
            transition: background-color 0.25s ease, transform 0.2s ease;
        }

        .kategori-rozeti:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }

        .konum-kutusu {
            position: absolute;
            bottom: 65px;
            right: 35px;
            background-color: rgba(255, 255, 255, 0.08);
            color: #ccc;
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 12px;
            z-index: 3;
            cursor: default;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .konum-kutusu:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: rgba(233, 69, 96, 0.4);
        }

        .kayit-butonu {
            position: absolute;
            bottom: 18px;
            right: 16px;
            background-color: #e94560;
            color: white;
            padding: 7px 16px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            z-index: 3;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .kayit-butonu:hover {
            background-color: #ff6b81;
            transform: translateY(-2px);
        }

        .kayit-butonu:active {
            transform: translateY(1px);
            background-color: #c73550;
        }

        .kart-baslik {
            font-size: 24px;
            color: #eee;
            margin: 8px 0 12px 0;
            font-weight: bold;
        }

        .kart-aciklama {
            font-size: 14px;
            color: #999;
            line-height: 1.7;
            max-width: 360px;
        }

        .dekor-kare {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(233, 69, 96, 0.2);
            border-radius: 12px;
            bottom: 80px;
            right: 160px;
            z-index: 1;
            animation: donme 8s linear infinite;
        }

        .dekor-daire {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(83, 52, 131, 0.25);
            border-radius: 50%;
            top: 55px;
            right: 120px;
            z-index: 1;
            animation: nabiz 3s ease-in-out infinite;
        }

        @keyframes donme {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes nabiz {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 0.5;
            }
        }

        .alt-bilgi {
            text-align: center;
            padding: 30px 20px;
            color: #555;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <a href="index.html" class="sabit-buton-sol">Ana Sayfaya Dön</a>

    <a href="#" class="sabit-buton-sag">Yardımcı Menü</a>

    <div class="baslik-alani">
        <h2>Marmara Üniversitesi – Bilgisayar Mühendisliği</h2>
    </div>

    <div class="kart-kapsayici">

        <div class="kategori-rozeti">Ücretsiz</div>

        <div class="tarih-etiketi">10 Nisan</div>

        <div class="dekor-kare"></div>
        <div class="dekor-daire"></div>

        <h1 class="kart-baslik">Yapay Zeka Zirvesi</h1>
        <p class="kart-aciklama">
            22 Nisan Çarşamba günü T2 -1 katında yapay zeka zirvesi yapılacaktır.
        </p>

        <div class="konum-kutusu">Konum: Teknoloji Fakültesi B207</div>

        <div class="kayit-butonu">Son Kayıt</div>

    </div>

    <div class="alt-bilgi">
        <p>&copy; 2026 Muhammed Emin Dinç | Web Programlama Dersi</p>
    </div>

</body>

</html>
